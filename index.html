<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Happy Birthday gf Mark 💚</title>

<link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Quicksand&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  overflow: hidden;
  font-family: 'Quicksand', sans-serif;
  background: linear-gradient(135deg, #e9f5db, #cfe1b9, #d4a373);
}

/* 🌧️ HUJAN EMOJI */
.rain {
  position: absolute;
  top: -50px;
  font-size: 25px;
  animation: fall linear infinite;
}

@keyframes fall {
  to {
    transform: translateY(110vh);
  }
}

/* SLIDE */
.slide {
  display: none;
  height: 100vh;
  justify-content: center;
  align-items: center;
}

.active {
  display: flex;
}

/* FRAME */
.frame {
  background: rgba(255,255,255,0.7);
  padding: 35px;
  border-radius: 30px;
  width: 85%;
  max-width: 520px;
  text-align: center;
  backdrop-filter: blur(12px);
  box-shadow: 0 0 30px rgba(0,255,150,0.4);
}

/* FONT */
h1,h2 {
  font-family: 'Pacifico', cursive;
  color: #2d6a4f;
}

/* BUTTON */
button {
  margin-top: 15px;
  padding: 10px 20px;
  border-radius: 25px;
  border: none;
  background: #95d5b2;
  font-family: 'Pacifico', cursive;
  cursor: pointer;
}

/* 🎮 GAME GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(4, 70px);
  gap: 12px;
  justify-content: center;
}

/* 🧩 CARD BAGUS */
.card {
  width: 70px;
  height: 70px;
  background: linear-gradient(145deg, #ffffff, #d8f3dc);
  border-radius: 20px;
  font-size: 28px;
  display: flex;
  justify-content: center;
  align-items: center;
  cursor: pointer;
  box-shadow: 5px 5px 10px #b7e4c7,
              -5px -5px 10px #ffffff;
  transition: 0.2s;
}

.card:active {
  transform: scale(0.9);
}

/* 🎂 CAKE */
.cake {
  font-size: 200px;
  cursor: pointer;
  animation: bounce 1s infinite alternate;
}

@keyframes bounce {
  from {transform: scale(1);}
  to {transform: scale(1.1);}
}

/* VIDEO */
video {
  width: 100%;
  border-radius: 15px;
}
</style>
</head>

<body>

<!-- 🌧️ EMOJI HUJAN -->
<script>
for(let i=0;i<50;i++){
  let e=document.createElement("div");
  e.className="rain";
  e.innerText=Math.random()>0.5?"🍀":"☘️";
  e.style.left=Math.random()*100+"vw";
  e.style.animationDuration=(3+Math.random()*5)+"s";
  e.style.fontSize=(20+Math.random()*20)+"px";
  document.body.appendChild(e);
}
</script>

<!-- SLIDE 1 -->
<div class="slide active">
  <div class="frame">
    <h1>🎉 Happy Birthday gf Mark 🎉</h1>
    <p>🍀🐯🐻</p>
    <button onclick="nextSlide()">Next 💚</button>
  </div>
</div>

<!-- SLIDE 2 GAME -->
<div class="slide">
  <div class="frame">
    <h2>🎮 Match Game</h2>
    <div class="grid" id="game"></div>
    <button onclick="nextSlide()">Next 💚</button>
  </div>
</div>

<!-- SLIDE 3 -->
<div class="slide">
  <div class="frame">
    <h2>✨ Make a Wish ✨</h2>
    <div class="cake" onclick="wish()">🎂</div>
    <div id="wishText"></div>
    <button onclick="wish()">Klik</button>
    <button onclick="nextSlide()">Next 💚</button>
  </div>
</div>

<!-- SLIDE 4 -->
<div class="slide">
  <div class="frame">
    <h2>💌 For You</h2>
    <p>
      Happy birthday 💚✨  
      semoga semua impian kamu tercapai 🍀  
      semoga kamu selalu bahagia dan sehat ☘️  
      panjang umur💕  
    </p>
    <button onclick="nextSlide()">Next 💚</button>
  </div>
</div>

<!-- SLIDE 5 -->
<div class="slide">
  <div class="frame">
    <h2>🎥 Special Video</h2>
    <video controls>
      <source src="video.mp4" type="video/mp4">
    </video>
  </div>
</div>

<script>
let current=0;
const slides=document.querySelectorAll(".slide");

function nextSlide(){
  slides[current].classList.remove("active");
  current++;
  if(current<slides.length){
    slides[current].classList.add("active");
  }
}

/* GAME */
const emojis=["🍀","☘️","💚","🎉","🍀","☘️","💚","🎉"];
let shuffled=emojis.sort(()=>0.5-Math.random());
let selected=[];

const game=document.getElementById("game");

shuffled.forEach(e=>{
  let card=document.createElement("div");
  card.className="card";
  card.innerText="?";
  card.dataset.val=e;

  card.onclick=()=>{
    card.innerText=e;
    selected.push(card);

    if(selected.length==2){
      if(selected[0].dataset.val!==selected[1].dataset.val){
        setTimeout(()=>{
          selected[0].innerText="?";
          selected[1].innerText="?";
          selected=[];
        },600);
      } else {
        selected=[];
      }
    }
  };

  game.appendChild(card);
});

/* WISH */
function wish() {
  document.getElementById("wishText").innerHTML =
    '<img src="mark.jpg" width="200">';
}
</script>

</body>
</html>
